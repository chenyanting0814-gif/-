<style>
body {
  font-family: Arial, sans-serif;
  padding: 20px;
  display: flex;
}

/* 左側主區 */
.main-content {
  flex: 1;
}

/* 分類按鈕 */
.categories {
  margin-bottom: 10px;
}
.categories button {
  margin-right: 6px;
  padding: 6px 12px;
  cursor: pointer;
}

/* 狀態 */
.filter-status {
  margin: 10px 0;
  padding: 6px 12px;
  background: #eee;
  display: inline-block;
  border-radius: 20px;
  font-size: 14px;
}

/* 花牆 */
#flowers {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 14px;
  margin-top: 20px;
}
.flower {
  cursor: pointer;
  text-align: center;
}
.flower img {
  width: 100%;
  border-radius: 10px;
}
.tag {
  font-size: 12px;
  color: #666;
}

/* 好友列表，固定右側 */
.friends-container {
  width: 140px;
  position: sticky;
  top: 20px;
  height: calc(100vh - 40px);
  overflow-y: auto;
  margin-left: 20px;
  border-left: 1px solid #ccc;
  padding-left: 10px;
}
.friends-container strong {
  display: block;
  margin-bottom: 6px;
}
.friends span {
  display: block;
  margin-bottom: 8px;
  cursor: pointer;
}
.friends span.active {
  font-weight: bold;
  text-decoration: underline;
}

/* Popup */
#overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 10;
}
#popup {
  display: none;
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: #fff;
  padding: 16px;
  border-radius: 10px;
  max-width: 320px;
  width: 90%;
  z-index: 11;
}
#popup img {
  width: 100%;
  border-radius: 8px;
  margin-bottom: 10px;
}

/* ===== 手機版 ===== */
@media (max-width: 768px) {
  body {
    flex-direction: row;
  }

  .main-content {
    flex: 1;
    margin-right: 100px; /* 預留右側好友寬度 */
  }

  .friends-container {
    width: 100px; /* 固定右側寬度 */
    position: fixed; /* 固定在右側 */
    right: 0;
    top: 60px;
    height: calc(100vh - 60px);
    overflow-y: auto;
    border-left: 1px solid #ccc;
    padding-left: 5px;
    background: #fff;
    z-index: 5;
  }

  #flowers {
    grid-template-columns: repeat(4, 1fr); /* 一排 4 個 */
    gap: 6px;
  }

  .flower img {
    width: 100%;
    height: 80px; /* 縮小圖片高度 */
    object-fit: cover;
    border-radius: 6px;
  }

  .flower div {
    font-size: 10px; /* 名字和分類文字縮小 */
  }

  /* 手機版好友文字縮小 */
  .friends span {
    font-size: 12px;
  }
  .friends strong {
    font-size: 13px;
  }
}
</style>

// ===== 狀態 =====
let selectedFriend = null;
let currentCategory = '全部';

// ===== 統計每人花數 =====
function getFriendStats() {
  const stats = {};
  flowers.forEach(f => {
    [...new Set(f.owners)].forEach(o => {
      stats[o] = (stats[o] || 0) + 1;
    });
  });
  return stats;
}

// ===== 好友清單 =====
const friendsBox = document.getElementById('friendsBox');

function renderFriends() {
  friendsBox.innerHTML = '<strong>好友：</strong>';
  const stats = getFriendStats();

  Object.entries(stats)
    .sort((a, b) => b[1] - a[1])
    .forEach(([name, count]) => {
      const span = document.createElement('span');
      span.textContent = `${name}（${count}）`;
      if (selectedFriend === name) span.classList.add('active');
      span.onclick = () => selectFriend(name);
      friendsBox.appendChild(span);
    });
}

// ===== 顯示花 =====
const flowersBox = document.getElementById('flowers');

function displayFlowers(category) {
  flowersBox.innerHTML = '';

  flowers.forEach(flower => {
    if (category !== '全部' && flower.category !== category) return;
    if (selectedFriend && !flower.owners.includes(selectedFriend)) return;

    const div = document.createElement('div');
    div.className = 'flower';
    div.innerHTML = `
      <img src="${flower.image}">
      <div>${flower.name}</div>
      <div class="tag">${flower.category}</div>
    `;
    div.onclick = () => showFlowerPopup(flower);
    flowersBox.appendChild(div);
  });
}

// ===== 好友篩選 =====
function selectFriend(name) {
  selectedFriend = (selectedFriend === name) ? null : name;
  displayFlowers(currentCategory);
  updateFilterStatus();
  renderFriends();
}

// ===== 分類 =====
function selectCategory(category) {
  currentCategory = category;
  displayFlowers(category);
  updateFilterStatus();
}

// ===== 狀態顯示 =====
function updateFilterStatus() {
  document.getElementById('filterStatus').textContent =
    selectedFriend ? `目前顯示：${selectedFriend} 的花` : `目前顯示：${currentCategory}`;
}

// ===== Popup（花） =====
const popupContent = document.getElementById('popupContent');
const overlay = document.getElementById('overlay');
const popup = document.getElementById('popup');

function showFlowerPopup(flower) {
  popupContent.innerHTML = `
    <h3>${flower.name}</h3>
    <img src="${flower.image}">
    <p>擁有人：${flower.owners.length ? flower.owners.join('、') : '沒有人擁有'}</p>
  `;
  overlay.style.display = 'block';
  popup.style.display = 'block';
}

function closePopup() {
  overlay.style.display = 'none';
  popup.style.display = 'none';
}

// ===== 初始化 =====
renderFriends();
displayFlowers('全部');
updateFilterStatus();
</script>
